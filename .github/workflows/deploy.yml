name: Deploy Admin Frontend to EC2

# Push to main → build on GitHub's runner → ship standalone bundle to EC2 → reload PM2.
# The 2GB EC2 instance never builds, so there is no OOM risk and no build toolchain needed there.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js standalone)
        run: pnpm build

      - name: Assemble standalone bundle
        # Next's standalone server does not include static/public by default — copy them in,
        # then tar the whole standalone dir into a single artifact.
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          tar -czf deploy.tar.gz -C .next/standalone .

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy.tar.gz
          target: /home/ubuntu/

      - name: Deploy on EC2 (swap bundle + reload PM2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP=/home/ubuntu/amelia-web
            mkdir -p "$APP"
            rm -rf "$APP/app_new" && mkdir -p "$APP/app_new"
            tar -xzf /home/ubuntu/deploy.tar.gz -C "$APP/app_new"
            rm -rf "$APP/app_old"
            [ -d "$APP/app" ] && mv "$APP/app" "$APP/app_old" || true
            mv "$APP/app_new" "$APP/app"
            rm -f /home/ubuntu/deploy.tar.gz
            cd "$APP"
            pm2 reload amelia-admin-web || pm2 start ecosystem.config.js
            pm2 save
